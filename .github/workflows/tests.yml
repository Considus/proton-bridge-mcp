name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the oldest supported (macOS system Python); 3.12 is what
        # setup.py provisions. The server is stdlib-only, so no install step.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q server.py setup.py tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
