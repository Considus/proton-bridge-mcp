name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the oldest supported (macOS system Python); 3.12 is what
        # setup.py provisions. The server is stdlib-only, so no install step.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q server.py setup.py tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
